<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Poket Studio</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background-color: #fee9ed;
            font-family: Arial, sans-serif;
            color: #573006;

            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            padding: 40px 20px;
        }

        .logo {
            width: 220px;
            max-width: 80vw;
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #573006;
        }

        p {
            margin-top: 12px;
            margin-bottom: 30px;
            font-size: 18px;
            font-weight: 400;
            color: #573006;
        }

        .instagram-button {
            display: inline-block;
            padding: 14px 28px;
            border: 2px solid #573006;
            border-radius: 999px;
            text-decoration: none;
            color: #573006;
            font-weight: 400;
            transition: 0.2s ease;
        }

        .instagram-button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">

        <img
            src="https://res.cloudinary.com/dqne9w30l/image/upload/v1780869030/Poket_Logo_wnzjer.png"
            alt="The Poket Studio"
            class="logo"
        >

        <h1>COMING SOON</h1>

        <p>stay tuned</p>

        <a
            class="instagram-button"
            href="https://www.instagram.com/poketstudio"
            target="_blank"
        >
            @poketstudio
        </a>

    </div>

</body>
</html>
